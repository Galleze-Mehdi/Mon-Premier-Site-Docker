name: Tester mon site Docker

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4
    
    - name: Construire l'image Docker
      run: docker build -t mon-site-test .
    
    - name: Lancer le conteneur
      run: docker run -d -p 8080:80 mon-site-test
    
    - name: Vérifier que le site répond
      run: |
        sleep 2
        curl --fail http://localhost:8080 || exit 1
    
    - name: Succès
      run: echo "✅ Le site fonctionne parfaitement !"
