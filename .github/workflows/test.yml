name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4
    
    - name: Construire l'image Docker
      run: docker build -t mon-site-test .
    
    - name: Lancer le conteneur
      run: docker run -d -p 8080:80 mon-site-test
    
    - name: Vérifier que le site répond
      run: |
        sleep 2
        curl --fail http://localhost:8080 || exit 1
    
    - name: Vérifier le contenu HTML
      run: |
        curl -s http://localhost:8080 | grep -q "<h1>" && echo "✅ Titre trouvé" || exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Récupérer le code
      uses: actions/checkout@v4
    
    - name: Déployer sur GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        keep_files: false
